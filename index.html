<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uniguide – University Admission Help Desk</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="chat-page">
 
  <!-- ══════════ SIDEBAR ══════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <button class="sb-btn has-tip" id="collapseBtn">
        <span class="sb-icon">☰</span>
        <span class="sb-label">Close sidebar</span>
        <span class="tip">Close sidebar</span>
      </button>
      <button class="sb-btn new-chat-btn has-tip" id="newChatBtn">
        <span class="sb-icon">＋</span>
        <span class="sb-label">New Chat</span>
        <span class="tip">New chat</span>
      </button>
    </div>
    <div class="sb-mid" id="sbMid">
      <div class="sb-sec-lbl">Recent</div>
      <div id="chatList">
        <div class="sb-empty">No chats yet.<br>Start a new conversation!</div>
      </div>
    </div>
    <div class="sb-bot">
      <button class="profile-btn has-tip" id="profileBtn">
        <div class="avatar" id="sbAvatar">U</div>
        <div class="profile-info">
          <div class="pname" id="sbName">User</div>
          <div class="phint">View profile</div>
        </div>
        <span class="tip">Profile</span>
      </button>
      <div class="pdrop" id="pdrop">
        <div class="dd-email" id="ddEmail">user@example.com</div>
        <div class="dd-div"></div>
        <button class="dd-item"><span class="dd-ico">⚙️</span>Settings</button>
        <button class="dd-item" id="ddLang"><span class="dd-ico">🌐</span>Language</button>
        <button class="dd-item"><span class="dd-ico">ℹ️</span>Learn More</button>
        <div class="dd-div"></div>
        <button class="dd-item danger" id="ddLogout"><span class="dd-ico">🚪</span>Logout</button>
      </div>
    </div>
  </aside>
 
  <div class="sb-overlay" id="sbOverlay"></div>
 
  <!-- ══════════ MAIN ══════════ -->
  <main class="main">
 
    <!-- Topbar -->
    <div class="topbar">
      <button class="mob-toggle" id="mobToggle" aria-label="Open sidebar">☰</button>
      <div class="topbar-logo">
        <div class="topbar-badge">🎓</div>
        <div>
          <span class="topbar-title"><span>Uni</span>guide</span>
          <span class="topbar-sub">&middot; <br>State University of Bangladesh</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="status-pill"><div class="status-dot"></div>Available 24/7</div>
        <div class="lang-toggle">
          <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
          <button class="lang-btn" id="btn-bn" onclick="setLang('bn')">বাং</button>
        </div>
      </div>
    </div>
 
    <!-- Chat Area — JS injects content here -->
    <div class="chat-area" id="chatArea"></div>
 
    <!-- ══════════ INPUT AREA ══════════ -->
    <div class="input-wrap-outer">
      <div class="input-row">
 
        <!-- PART 2: Quick Actions button + popup -->
        <div class="qa-wrap">
 
          <!-- Icon button: grid of 9 dots (modern "more" icon) -->
          <button class="qa-btn" id="qaBtn" aria-label="Quick actions" title="Quick actions">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
              <circle cx="4.5"  cy="4.5"  r="1.7" fill="currentColor"/>
              <circle cx="10"   cy="4.5"  r="1.7" fill="currentColor"/>
              <circle cx="15.5" cy="4.5"  r="1.7" fill="currentColor"/>
              <circle cx="4.5"  cy="10"   r="1.7" fill="currentColor"/>
              <circle cx="10"   cy="10"   r="1.7" fill="currentColor"/>
              <circle cx="15.5" cy="10"   r="1.7" fill="currentColor"/>
              <circle cx="4.5"  cy="15.5" r="1.7" fill="currentColor"/>
              <circle cx="10"   cy="15.5" r="1.7" fill="currentColor"/>
              <circle cx="15.5" cy="15.5" r="1.7" fill="currentColor"/>
            </svg>
          </button>
 
          <!-- Quick Actions Popup Menu -->
          <div class="qa-menu" id="qaMenu" role="menu">
            <div class="qa-menu-header">Quick Topics</div>
            <button class="qa-item" role="menuitem"><span class="qa-ico">📋</span>Requirements</button>
            <button class="qa-item" role="menuitem"><span class="qa-ico">📊</span>GPA</button>
            <button class="qa-item" role="menuitem"><span class="qa-ico">💰</span>Fees</button>
            <button class="qa-item" role="menuitem"><span class="qa-ico">🏆</span>Scholarships</button>
            <button class="qa-item" role="menuitem"><span class="qa-ico">📅</span>Deadline</button>
            <button class="qa-item" role="menuitem"><span class="qa-ico">✍️</span>How to Apply</button>
            <button class="qa-item" role="menuitem"><span class="qa-ico">📞</span>Contacts</button>
          </div>
        </div>
 
        <textarea
          id="userInput"
          rows="1"
          placeholder="Ask anything about admissions…"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="ibtn clear-btn" onclick="clearCurrentChat()" title="Clear chat">🗑️</button>
        <button class="ibtn send-btn" onclick="sendMessage()" title="Send">➤</button>
      </div>
    </div>
 
  </main>
 
  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
